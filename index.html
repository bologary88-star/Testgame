<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worldseed</title>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<script>

// ==========================================
// WORLDSEED ENGINE (OPTIMIZED CORE)
// ==========================================

class Worldseed {

constructor(){

this.canvas = document.getElementById("gameCanvas")
this.ctx = this.canvas.getContext("2d")

// world size slightly reduced for stability
this.worldWidth = 192
this.worldHeight = 192
this.tileSize = 16

// simulation caps
this.MAX_ENTITIES = 500

// world data
this.grid = []
this.entities = []
this.villages = []
this.particles = []

// camera
this.cameraX = 0
this.cameraY = 0
this.zoom = 1

// simulation timing
this.frame = 0
this.simulationStep = 6   // AI updates every 6 frames

// time
this.year = 1
this.time = 0
this.speed = 1
this.paused = false

// tools
this.selectedTool = "grass"
this.brushSize = 3
this.currentCategory = "terrain"

// races
this.races = {
human:{name:"Human",stats:{str:5,int:5,cha:5,spd:5}},
elf:{name:"Elf",stats:{str:3,int:7,cha:6,spd:6}},
dwarf:{name:"Dwarf",stats:{str:7,int:5,cha:3,spd:3}},
orc:{name:"Orc",stats:{str:8,int:3,cha:2,spd:5}},
halfling:{name:"Halfling",stats:{str:2,int:5,cha:7,spd:4}}
}

this.init()

}

init(){

this.setupCanvas()

this.generateWorld()

this.setupInput()

setTimeout(()=>{
document.getElementById("loading").classList.add("hidden")
this.showNotification("Worldseed ready. Create life.")
},1200)

this.startLoop()

}

// ==========================================
// CANVAS
// ==========================================

setupCanvas(){

const resize=()=>{

this.canvas.width = window.innerWidth
this.canvas.height = window.innerHeight

}

window.addEventListener("resize",resize)

resize()

}

// ==========================================
// WORLD GENERATION
// ==========================================

generateWorld(){

this.grid=[]

for(let y=0;y<this.worldHeight;y++){

let row=[]

for(let x=0;x<this.worldWidth;x++){

const noise =
Math.sin(x*0.05)*Math.cos(y*0.05) +
Math.sin((x+y)*0.03)

let type="grass"

if(noise>0.6) type="mountain"
else if(noise>0.35) type="forest"
else if(noise<-0.4) type="water"
else if(noise<-0.2) type="sand"

row.push({
type:type,
resource:null,
building:null
})

}

this.grid.push(row)

}

}

// ==========================================
// MAIN LOOP
// ==========================================

startLoop(){

const loop=()=>{

this.frame++

if(!this.paused){

// run simulation slower than rendering
if(this.frame % this.simulationStep === 0){
this.updateSimulation()
}

}

this.render()

requestAnimationFrame(loop)

}

requestAnimationFrame(loop)

}

// ==========================================
// SIMULATION CORE
// ==========================================

updateSimulation(){

this.time += 0.01 * this.speed

if(this.time >= 100){

this.time = 0
this.year++

document.getElementById("yearDisplay").textContent =
`Year ${this.year}`

}

// entity cap safety
if(this.entities.length > this.MAX_ENTITIES){

this.entities.length = this.MAX_ENTITIES

}

// clean dead entities
this.entities = this.entities.filter(e => e.health > 0)

}

// ==========================================
// RENDER SYSTEM (VISIBLE TILES ONLY)
// ==========================================

render(){

const ctx = this.ctx
const w = this.canvas.width
const h = this.canvas.height

ctx.fillStyle = "#1a1a2e"
ctx.fillRect(0,0,w,h)

ctx.save()

ctx.translate(this.cameraX,this.cameraY)
ctx.scale(this.zoom,this.zoom)

// determine visible tile region
const startX =
Math.floor(-this.cameraX/(this.tileSize*this.zoom))

const startY =
Math.floor(-this.cameraY/(this.tileSize*this.zoom))

const endX =
startX + Math.ceil(w/(this.tileSize*this.zoom)) + 2

const endY =
startY + Math.ceil(h/(this.tileSize*this.zoom)) + 2

for(let y=Math.max(0,startY);y<Math.min(this.worldHeight,endY);y++){

for(let x=Math.max(0,startX);x<Math.min(this.worldWidth,endX);x++){

const tile=this.grid[y][x]

const px = x*this.tileSize
const py = y*this.tileSize

ctx.fillStyle=this.getTerrainColor(tile.type)

ctx.fillRect(px,py,this.tileSize,this.tileSize)

}

}

// entities
this.entities.forEach(e=>{

ctx.font="14px serif"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.fillText(
this.getRaceEmoji(e.race,e.gender),
e.x*this.tileSize + this.tileSize/2,
e.y*this.tileSize + this.tileSize/2
)

})

ctx.restore()

}

// ==========================================
// UTILITIES
// ==========================================

getTerrainColor(type){

switch(type){

case "grass": return "#7cb342"
case "forest": return "#558b2f"
case "water": return "#4fc3f7"
case "sand": return "#ffe082"
case "mountain": return "#8d6e63"

default: return "#7cb342"

}

}

getRaceEmoji(race,gender){

const emojis={
human: gender==="male"?"👨":"👩",
elf: gender==="male"?"🧝‍♂️":"🧝‍♀️",
dwarf: gender==="male"?"🧔":"👩‍🦰",
orc: gender==="male"?"👹":"👺",
halfling: gender==="male"?"🤴":"👸"
}

return emojis[race] || "👤"

}

showNotification(text){

const n=document.getElementById("notification")

if(!n) return

n.textContent=text
n.classList.add("show")

setTimeout(()=>{
n.classList.remove("show")
},3000)

}

// ==========================================
// INPUT (basic camera)
// ==========================================

setupInput(){

let dragging=false
let lastX=0
let lastY=0

this.canvas.addEventListener("mousedown",e=>{
dragging=true
lastX=e.clientX
lastY=e.clientY
})

window.addEventListener("mouseup",()=>{
dragging=false
})

window.addEventListener("mousemove",e=>{

if(!dragging) return

this.cameraX += e.clientX-lastX
this.cameraY += e.clientY-lastY

lastX=e.clientX
lastY=e.clientY

})

this.canvas.addEventListener("wheel",e=>{

e.preventDefault()

const delta = e.deltaY > 0 ? 0.9 : 1.1

this.zoom = Math.max(0.5,Math.min(3,this.zoom*delta))

},{passive:false})

}

}

// initialize
window.onload=()=>{
window.game = new Worldseed()
}
// ==========================================
// ENTITY SYSTEM
// ==========================================

spawnCharacter(x,y,race,parents=null){

if(this.entities.length >= this.MAX_ENTITIES) return

const raceData = this.races[race]

const character={

id:Math.random().toString(36).slice(2),

x:x,
y:y,

race:race,

gender:Math.random()>0.5?"male":"female",

age:0,
maxAge:50+Math.random()*30,

health:100,
hunger:50,
happiness:50,

inventory:{food:0,gold:0,materials:0},

relationships:[],
children:[],

married:null,

job:null,
state:"idle",

generation:parents ? Math.max(
parents[0]?.generation||0,
parents[1]?.generation||0
)+1 : 0,

stats:{...raceData.stats},

fertility:0.5+Math.random()*0.5

}

// hybrid stats
if(parents){

character.stats={
str:(parents[0].stats.str+parents[1].stats.str)/2,
int:(parents[0].stats.int+parents[1].stats.int)/2,
cha:(parents[0].stats.cha+parents[1].stats.cha)/2,
spd:(parents[0].stats.spd+parents[1].stats.spd)/2
}

}

this.entities.push(character)

this.updateStats()

return character

}

// ==========================================
// ENTITY SIMULATION
// ==========================================

updateSimulation(){

super.updateSimulation?.()

// update entities
for(let i=0;i<this.entities.length;i++){

this.updateEntity(this.entities[i])

}

// villages update occasionally
if(this.frame % 60 === 0){
this.updateVillages()
}

}

// ==========================================
// ENTITY AI
// ==========================================

updateEntity(e){

// aging
e.age += 0.01*this.speed

if(e.age > e.maxAge){

e.health -= 0.1

}

// hunger
e.hunger -= 0.05

if(e.hunger < 0){
e.health -= 0.2
}

if(e.hunger > 80){
e.health = Math.min(100,e.health+0.05)
}

// basic behavior
switch(e.state){

case "idle":

if(e.hunger < 30){
this.seekFood(e)
}

else if(e.age>18 && !e.married){
this.seekMate(e)
}

else{
this.moveRandom(e)
}

break

}

}

// ==========================================
// FOOD SEARCH
// ==========================================

seekFood(e){

for(let i=0;i<20;i++){

const dx=Math.floor(Math.random()*10)-5
const dy=Math.floor(Math.random()*10)-5

const x=Math.floor(e.x+dx)
const y=Math.floor(e.y+dy)

if(x<0||y<0||x>=this.worldWidth||y>=this.worldHeight) continue

const cell=this.grid[y][x]

if(cell.resource==="berry" || cell.resource==="tree"){

this.moveToward(e,x,y)

if(Math.abs(e.x-x)<1 && Math.abs(e.y-y)<1){

e.hunger = Math.min(100,e.hunger+40)

cell.resource=null

}

return

}

}

this.moveRandom(e)

}

// ==========================================
// RELATIONSHIPS
// ==========================================

seekMate(e){

for(let i=0;i<this.entities.length;i++){

const other=this.entities[i]

if(other===e) continue
if(other.gender===e.gender) continue
if(other.age<18) continue
if(other.married) continue

const dist = Math.hypot(
other.x-e.x,
other.y-e.y
)

if(dist < 6){

this.moveToward(e,other.x,other.y)

if(dist < 2){

this.formRelationship(e,other)

}

return

}

}

}

formRelationship(a,b){

a.married=b
b.married=a

this.showNotification(
`${a.race} and ${b.race} bonded`
)

// reproduction chance
if(Math.random() < (a.fertility+b.fertility)/2){

setTimeout(()=>{

const childRace = Math.random()>0.5 ? a.race : b.race

const child=this.spawnCharacter(
Math.floor(a.x),
Math.floor(a.y),
childRace,
[a,b]
)

a.children.push(child)
b.children.push(child)

this.showNotification("A child was born")

},2000)

}

}

// ==========================================
// MOVEMENT
// ==========================================

moveToward(e,tx,ty){

const dx=Math.sign(tx-e.x)
const dy=Math.sign(ty-e.y)

const speed=e.stats.spd*0.1

e.x+=dx*speed
e.y+=dy*speed

e.x=Math.max(0,Math.min(this.worldWidth-1,e.x))
e.y=Math.max(0,Math.min(this.worldHeight-1,e.y))

}

moveRandom(e){

const angle=Math.random()*Math.PI*2
const speed=e.stats.spd*0.05

e.x+=Math.cos(angle)*speed
e.y+=Math.sin(angle)*speed

}

// ==========================================
// VILLAGE SYSTEM (OPTIMIZED)
// ==========================================

updateVillages(){

this.villages=[]

const visited=new Set()

for(let i=0;i<this.entities.length;i++){

const e=this.entities[i]

if(visited.has(e.id)) continue

const group=[e]

visited.add(e.id)

for(let j=i+1;j<this.entities.length;j++){

const other=this.entities[j]

const dist=Math.hypot(
other.x-e.x,
other.y-e.y
)

if(dist < 12){

group.push(other)
visited.add(other.id)

}

}

if(group.length >= 4){

const centerX = group.reduce((s,a)=>s+a.x,0)/group.length
const centerY = group.reduce((s,a)=>s+a.y,0)/group.length

this.villages.push({

members:group,
centerX:centerX,
centerY:centerY,
founded:this.year

})

}

}

}
// ==========================================
// TERRAIN & TOOL SYSTEM
// ==========================================

applyTool(x,y){

const cell=this.grid[y][x]
const tool=this.selectedTool

// terrain editing
if(["grass","forest","water","sand","mountain"].includes(tool)){

cell.type=tool

if(tool==="forest"){
cell.resource="tree"
}

}

// resources
if(["tree","rock","berry","gold","iron","crystal"].includes(tool)){

cell.resource=tool

}

// building placement
if(["house","farm","mine","market","wall","bridge"].includes(tool)){

cell.building={
type:tool,
health:100
}

}

// race spawn
if(tool.startsWith("spawn_")){

const race=tool.replace("spawn_","")

this.spawnCharacter(x,y,race)

}

// powers
if(tool==="smite"){

this.entities=this.entities.filter(e=>{

const dist=Math.hypot(e.x-x,e.y-y)

if(dist<2){
this.addParticle(e.x,e.y,"⚡")
return false
}

return true

})

}

if(tool==="heal"){

this.entities.forEach(e=>{

const dist=Math.hypot(e.x-x,e.y-y)

if(dist<3){

e.health=Math.min(100,e.health+50)
this.addParticle(e.x,e.y,"💚")

}

})

}

if(tool==="meteor"){

this.addParticle(x,y,"☄️")

for(let dy=-3;dy<=3;dy++){
for(let dx=-3;dx<=3;dx++){

const mx=x+dx
const my=y+dy

if(mx<0||my<0||mx>=this.worldWidth||my>=this.worldHeight) continue

this.grid[my][mx].type="sand"
this.grid[my][mx].building=null

}
}

}

}

// ==========================================
// BRUSH PAINTING
// ==========================================

paintAt(x,y){

const r=this.brushSize

for(let dy=-r;dy<=r;dy++){
for(let dx=-r;dx<=r;dx++){

if(dx*dx+dy*dy>r*r) continue

const wx=x+dx
const wy=y+dy

if(wx<0||wy<0||wx>=this.worldWidth||wy>=this.worldHeight) continue

this.applyTool(wx,wy)

}
}

}

// ==========================================
// PARTICLE SYSTEM
// ==========================================

addParticle(x,y,emoji){

this.particles.push({

x:x,
y:y,

emoji:emoji,

life:30,

vx:(Math.random()-0.5)*0.3,
vy:-0.2-Math.random()*0.3

})

}

// ==========================================
// PARTICLE UPDATE
// ==========================================

updateParticles(){

this.particles=this.particles.filter(p=>{

p.life--

p.x+=p.vx
p.y+=p.vy

return p.life>0

})

}

// ==========================================
// STATS UPDATE
// ==========================================

updateStats(){

const pop=document.getElementById("popCount")
const villages=document.getElementById("villageCount")

if(pop) pop.textContent=this.entities.length
if(villages) villages.textContent=this.villages.length

}

// ==========================================
// SAVE / LOAD
// ==========================================

saveWorld(){

const data={

grid:this.grid,
entities:this.entities,
villages:this.villages,

year:this.year,
time:this.time

}

localStorage.setItem(
"worldseed_save",
JSON.stringify(data)
)

this.showNotification("World saved")

}

loadWorld(){

const data=localStorage.getItem("worldseed_save")

if(!data) return

const parsed=JSON.parse(data)

this.grid=parsed.grid
this.entities=parsed.entities
this.villages=parsed.villages

this.year=parsed.year
this.time=parsed.time

document.getElementById("yearDisplay").textContent=`Year ${this.year}`

this.showNotification("World loaded")

}

// ==========================================
// CLEAR WORLD
// ==========================================

clearWorld(){

this.entities=[]
this.villages=[]

this.generateWorld()

this.year=1
this.time=0

document.getElementById("yearDisplay").textContent="Year 1"

this.showNotification("World cleared")

}

// ==========================================
// SETTINGS
// ==========================================

toggleSettings(){

this.showNotification("Settings coming soon")

}

</script>

</body>
</html>
